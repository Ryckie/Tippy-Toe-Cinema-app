<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: headerelement}"></head>
<body class="home d-flex flex-column">

<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container my-5 flex-grow-1">
    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-3">
        <div th:each="movie : ${movies}" class="col">
            <div class="card h-100 movie-card shadow">
                <img th:src="${movie.posterUrl}" class="card-img-top movie-card-img" th:alt="${movie.movieName}">
                <div class="card-body p-2 d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <h5 class="card-title branding-font text-warning mb-0" th:text="${movie.movieName}">Film
                            Naam</h5>
                        <span class="badge bg-secondary" th:text="${movie.releaseYear}">Jaar</span>
                    </div>
                    <small class="card-subtitle mb-2 text-info d-block" th:text="${movie.genre}">Genre</small>

                    <p class="card-text flex-grow-1 small" th:text="${movie.movieDescription}">Beschrijving</p>

                    <hr class="border-warning my-2">
                    <div class="movie-info-bottom mb-2 small">
                        <div class="d-flex justify-content-between flex-wrap">
                            <span><i class="bi bi-door-open"></i> <strong
                                    th:text="${movie.hallName}">Zaal</strong></span>
                            <span><i class="bi bi-people"></i> <strong
                                    th:text="${movie.numberOfFreeSeats}">Zetels</strong></span>
                        </div>
                    </div>
                    <div class="mt-auto">
                        <a th:href="${movie.trailerUrl}" target="_blank" class="btn btn-outline-warning btn-sm w-100">
                            <i class="bi bi-play-circle"> TRAILER</i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer}"></footer>
</body>
</html>
